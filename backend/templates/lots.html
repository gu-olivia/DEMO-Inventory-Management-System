<body>
  <h1>Lots</h1>
  <a href="/">
    <button>Back to Home</button>
  </a>
  <p></p>
  <table>
    <thead>
      <tr>
        <th>Lot ID</th>
        <th>Product ID</th>
        <th>Lot Number</th>
        <th>Creation Date</th>
        <th>Expiration Date</th>
        <th>Product State</th>
        <th>5 uL/test Conc.</th>
        <th>Initial Volume</th>
        <th>Remarks</th>
      </tr>
    </thead>
    <tbody id="lotsTable"></tbody>
  </table>

  <div id="lots"></div>

  <h2 id="formTitle">Add New Lot</h2>
  <p></p>
  <form id="lotForm">
        <div>
      <label>Product Name</label>
      <select id="product_id"></select>
    </div>
    <div>
      <label>Lot Number</label>
      <input id="lot_number" type="text" />
    </div>
    <div>
      <label>Creation Date</label>
      <input id="creation_date" type="date" />
    </div>
    <div>
      <label>Expiration Date</label>
      <input id="expiration_date" type="date" />
    </div>
    <div>
      <label>Product State</label>
      <select id="product_state">
        <option>active</option>
        <option>quarantined</option>
        <option>DQ</option>
      </select>
    </div>
    <div>
      <label>5 uL/test conc</label>
      <input id="test_5uL_concentration_ug_mL" type="text">
      </select>
    </div>
        <div>
      <label>Initial Volume</label>
      <input id="initial_volume_mL" type="text">
      </select>
    </div>
            <div>
      <label>Remarks</label>
      <input id="remarks" type="text">
      </select>
    </div>
    <div>
      <button type="submit">Add Lot</button>
      <button type="button" onclick="cancelEdit('lot')">
        Cancel Edit
    </button>
    </div>
  </form>

  <script src="/static/app.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</body>
